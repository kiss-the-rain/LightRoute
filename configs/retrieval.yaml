retrieval:
  topk: 10
  k_values: [1, 5, 10]
  topk_visual: 10
  topk_text: 10
  candidate_merge_mode: union
  evaluation_topk: [1, 5, 10]
  score_normalization_method: minmax
  cache_predictions: true

retrieval_router:
  enable_adaptive_coarse: true
  enable_bm25_coarse: false
  bypass_threshold: 40
  coarse_topk: 50
  coarse_method: bm25

ocr_router:
  enable_ocr_page_coarse: true
  enable_bm25_coarse: false
  bypass_threshold: 40
  coarse_topk: 50
  coarse_method: bm25

ocr_semantic_retrieval:
  enable_bge_m3: true
  model_name: /home/cuizhibin/projects/Models/bge-m3
  local_files_only: true
  device: cuda:0
  batch_size: 8
  max_length: 1024
  semantic_topk: 30

ocr_reranker:
  enable_bge_reranker: true
  model_name: /home/cuizhibin/projects/Models/bge-reranker-v2-m3
  local_files_only: true
  device: cuda:0
  batch_size: 8
  max_length: 1024
  rerank_topk: 10

visual_retriever:
  type: colpali_stub
  embedding_dim: 128
  use_surrogate_text: true
  cache_embeddings: true
  cache_path: data/embeddings/visual_index.pkl

visual:
  model_name: src/models/vidore_colpali_v1.2_hf
  device: cuda:0
  topk: 10
  local_files_only: true

visual_colqwen_retrieval:
  model_name: /home/cuizhibin/projects/Models/colqwen2.5-v0.2
  base_model_name: /home/cuizhibin/projects/Models/colqwen2.5-base
  local_files_only: true
  device: cuda:0
  batch_size: 4
  max_pages_per_doc: 256

visual_nemotron_energy:
  model_name: /home/cuizhibin/projects/Models/nemotron-colembed-vl-8b-v2
  dataset_path: /home/cuizhibin/projects/Models/vidore_dataset/vidore_v3_energy
  local_files_only: true
  device: cuda:0
  batch_size: 2
  enable_embedding_cache: true
  enable_feature_cache: true
  cache_dir: outputs/cache/visual_nemotron_energy
  fusion_checkpoint_path: outputs/checkpoints/adaptive_fusion_visual_colqwen_ocr_chunk/adaptive_fusion_visual_colqwen_ocr_chunk_best.pkl

bm25_vidore_energy:
  dataset_path: /home/cuizhibin/projects/Models/vidore_dataset/vidore_v3_energy
  sweep_topks: [1, 5, 10, 20, 50, 100, 200, 300, 400, 500, 600, 700 ]

bm25_600_nemotron_bge_vidore_energy:
  dataset_path: /home/cuizhibin/projects/Models/vidore_dataset/vidore_v3_energy
  coarse_topk: 600
  final_merge_strategy: adaptive_fusion_mlp
  fusion_checkpoint_path: outputs/checkpoints/adaptive_fusion_visual_nemotron_ocr_energy/adaptive_fusion_visual_nemotron_ocr_energy_best.pkl

bm25_600_nemotron_bge_mpdocvqa:
  dataset_path: data/processed/mpdocvqa/val.jsonl
  coarse_topk: 600
  final_merge_strategy: rrf
  rrf_k: 60
  page_id_format: "{doc_id}_p{page_index}"

visual_nemotron_mpdocvqa:
  dataset_path: data/processed/mpdocvqa/val.jsonl
  page_id_format: "{doc_id}_p{page_index}"

text_retriever:
  type: bm25
  cache_index: true
  cache_path: data/indexes/text_bm25_index.pkl
  k1: 1.5
  b: 0.75

ocr_retrieval:
  bge_model_name: /home/cuizhibin/projects/Models/bge-m3
  reranker_model_name: /home/cuizhibin/projects/Models/bge-reranker-v2-m3
  topk: 10
  coarse_topn: 30
  batch_size: 8
  rerank_batch_size: 8
  max_length: 512
  rerank_max_length: 512
  device: cuda:0
  local_files_only: true

ocr_chunk_retrieval:
  chunk_size: 128
  chunk_stride: 96
  page_text_variant: clean_page_text
  query_variant: instruction_query
  aggregate_strategy: max
  coarse_topn: 30
  hybrid_bm25_topn: 20
  debug_chunk_stats: true

ocr_nv_retrieval:
  model_name: /home/cuizhibin/projects/Models/NV-Embed-v2
  local_files_only: true
  device: cuda:0
  query_instruction: "Instruct: Given a question, retrieve passages that answer the question\nQuery: "
  topk: 10
  coarse_topn: 30
  batch_size: 2
  max_length: 512

ocr_jina_retrieval:
  model_name: /home/cuizhibin/projects/Models/jina-embeddings-v3
  dependency_model_name: /home/cuizhibin/projects/Models/xlm-roberta-flash-implementation
  local_files_only: true
  device: cuda:0
  topk: 10
  coarse_topn: 30
  query_task: retrieval.query
  passage_task: retrieval.passage
  batch_size: 8
  max_length: 1024
